<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Voice Feishu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1a1a1a;
    }
    h1 { font-size: 17px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 12px; margin-bottom: 14px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid #eee;
      font-size: 13px;
    }
    .badge {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .ok { background: #d1fae5; color: #065f46; }
    .missing { background: #fee2e2; color: #991b1b; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      background: #4f46e5;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <h1>Voice Feishu</h1>
  <p class="subtitle">语音控制飞书</p>

  <div class="row">
    <span>OpenAI</span>
    <span id="openai-status" class="badge missing">未配置</span>
  </div>
  <div class="row">
    <span>飞书</span>
    <span id="feishu-status" class="badge missing">未授权</span>
  </div>

  <button id="open-options">打开设置</button>

  <script src="popup.js"></script>
</body>
</html>
