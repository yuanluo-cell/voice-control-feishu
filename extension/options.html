<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Voice Feishu 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; max-width: 520px; margin: 0 auto; color: #1a1a1a; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }
    .section { margin-bottom: 28px; }
    .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #4f46e5; }
    .readonly-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .readonly-row input { margin-bottom: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    button {
      padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
      cursor: pointer; font-weight: 500;
    }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .status { font-size: 13px; margin-top: 8px; padding: 6px 10px; border-radius: 4px; }
    .status-ok { background: #d1fae5; color: #065f46; }
    .status-err { background: #fee2e2; color: #991b1b; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .small-note { color: #666; font-size: 12px; line-height: 1.5; margin-top: 8px; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Voice Feishu</h1>
  <p class="subtitle">语音控制飞书 — 浏览器扩展设置</p>

  <div class="section">
    <h2>OpenAI</h2>
    <label for="openai-key">API Key</label>
    <input type="password" id="openai-key" placeholder="sk-...">
    <button class="btn-primary" id="save-openai">保存</button>
    <div id="openai-status" class="status" style="display:none"></div>
  </div>

  <div class="section">
    <h2>飞书</h2>
    <label for="feishu-redirect-uri">Redirect URL（填到飞书开发者后台）</label>
    <div class="readonly-row">
      <input type="text" id="feishu-redirect-uri" readonly>
      <button class="btn-secondary" id="copy-redirect-uri">复制</button>
    </div>
    <label for="feishu-app-id">App ID</label>
    <input type="text" id="feishu-app-id" placeholder="cli_xxxxxxxxx">
    <label for="feishu-app-secret">App Secret</label>
    <input type="password" id="feishu-app-secret" placeholder="应用密钥">
    <button class="btn-primary" id="feishu-oauth">授权飞书</button>
    <button class="btn-secondary" id="feishu-logout">清除授权</button>
    <div id="feishu-status" class="status" style="display:none"></div>
    <div id="feishu-scopes" class="small-note" style="display:none"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
